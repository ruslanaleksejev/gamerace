<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Ajastute Ralli</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #algus-vaade, #mangu-vaade { text-align: center; background: #333; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { border: 4px solid #555; background: #222; margin-top: 20px; display: block; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; }
        .nupud { margin: 15px 0; }
        button { padding: 10px 20px; font-size: 16px; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .lihtne { background: #27ae60; } .keskmine { background: #f39c12; } .raske { background: #c0392b; }
        #info-paneel { margin-bottom: 10px; font-weight: bold; font-size: 18px; color: #f1c40f; }
    </style>
</head>
<body>
    <div id="algus-vaade">
        <h1>Ajastute Ralli</h1>
        <input type="text" id="kasutajanimi" placeholder="Sisesta oma nimi...">
        <div class="nupud">
            <p>Vali raskusaste:</p>
            <button class="lihtne" onclick="alusta(0.6)">Lihtne</button>
            <button class="keskmine" onclick="alusta(1)">Tavaline</button>
            <button class="raske" onclick="alusta(1.5)">Raske</button>
        </div>
        <div id="edetabel">
            <h3>🏆 Edetabel (TOP 5):</h3>
            <ul id="edetabeli-list" style="list-style: none; padding: 0;"></ul>
        </div>
    </div>

    <div id="mangu-vaade" style="display:none;">
        <div id="info-paneel">
            <span id="mangija-nimi"></span> | 
            <span id="ajastu-nimi"></span> | 
            <span id="skoor-tekst">Skoor: 0</span>
        </div>
        <canvas id="manguVali" width="800" height="400"></canvas>
        <p style="color: #aaa;">Hoia Nooleklahve (Üles/Alla), et liikuda!</p>
    </div>

    <script src="game.js"></script>
</body>
</html>
